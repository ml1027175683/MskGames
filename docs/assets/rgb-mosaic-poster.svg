<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">RGB Mosaic Mine Poster</title>
  <desc id="desc">A dark RGB pixel mining poster for the RGB mosaic asset game.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17110b" />
      <stop offset="0.52" stop-color="#090807" />
      <stop offset="1" stop-color="#030303" />
    </linearGradient>
    <radialGradient id="redGlow" cx="22%" cy="24%" r="40%">
      <stop offset="0" stop-color="#ff2b5f" stop-opacity="0.34" />
      <stop offset="1" stop-color="#ff2b5f" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="blueGlow" cx="82%" cy="18%" r="38%">
      <stop offset="0" stop-color="#00d9ff" stop-opacity="0.28" />
      <stop offset="1" stop-color="#00d9ff" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#282015" stroke-width="1" opacity="0.55" />
    </pattern>
    <pattern id="fine" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="#f5f1df" opacity="0.13" />
    </pattern>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .mono { font-family: Consolas, 'Courier New', monospace; }
      .serif { font-family: Georgia, 'Times New Roman', serif; }
      .label { fill: #b8af9b; font-size: 18px; letter-spacing: 3px; }
      .micro { fill: #766f62; font-size: 14px; letter-spacing: 1px; }
      .title { fill: #f5f1df; font-size: 78px; font-weight: 700; letter-spacing: 2px; }
    </style>
  </defs>

